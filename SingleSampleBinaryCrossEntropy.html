<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCE Loss 二元交叉熵损失可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --y1-color: #059669; /* 绿色代表正类 */
            --y0-color: #dc2626; /* 红色代表负类 */
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .formula-box {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.1rem;
        }

        .formula-highlight {
            color: #fbbf24;
            font-weight: bold;
        }

        .result-display {
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BCE Loss 交互式可视化工具</h1>

    <div class="control-panel">
        <div class="control-group">
            <label>真实标签 (True Label $y$):</label>
            <div class="radio-group">
                <label><input type="radio" name="trueLabel" value="1" checked onchange="update()"> <span style="color:var(--y1-color)">1 (正类)</span></label>
                <label><input type="radio" name="trueLabel" value="0" onchange="update()"> <span style="color:var(--y0-color)">0 (负类)</span></label>
            </div>
        </div>
        <div class="control-group">
            <label>预测概率 ($\hat{y}$): <span id="y-hat-val">0.50</span></label>
            <input type="range" id="y-hat-slider" min="0.01" max="0.99" step="0.01" value="0.5" oninput="update()">
        </div>
    </div>

    <div class="formula-box" id="formula">
        L = -[ y·log(ŷ) + (1-y)·log(1-ŷ) ]
    </div>

    <div class="result-display">
        当前 Loss 值: <span id="loss-result" style="color: var(--primary-color);">0.693</span>
    </div>

    <div class="chart-container">
        <canvas id="bceChart"></canvas>
    </div>
</div>

<script>
    let chart;
    
    function initChart() {
        const ctx = document.getElementById('bceChart').getContext('2d');
        
        // 生成曲线数据
        const labels = [];
        const dataY1 = [];
        const dataY0 = [];
        for (let i = 0.01; i <= 0.99; i += 0.01) {
            labels.push(i.toFixed(2));
            dataY1.push(-Math.log(i));
            dataY0.push(-Math.log(1 - i));
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '当 y = 1 时: -log(ŷ)',
                        data: dataY1,
                        borderColor: '#059669',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        borderDash: [5, 5]
                    },
                    {
                        label: '当 y = 0 时: -log(1-ŷ)',
                        data: dataY0,
                        borderColor: '#dc2626',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        borderDash: [5, 5]
                    },
                    {
                        label: '当前损失点',
                        data: [],
                        backgroundColor: '#2563eb',
                        borderColor: '#fff',
                        borderWidth: 2,
                        pointRadius: 8,
                        pointHoverRadius: 10,
                        showLine: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: { display: true, text: '预测概率 (ŷ)' }
                    },
                    y: {
                        title: { display: true, text: 'Loss 值' },
                        suggestedMax: 3
                    }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    }

    function update() {
        const yHat = parseFloat(document.getElementById('y-hat-slider').value);
        const y = parseInt(document.querySelector('input[name="trueLabel"]:checked').value);
        
        document.getElementById('y-hat-val').innerText = yHat.toFixed(2);

        // 计算 Loss
        const loss = -(y * Math.log(yHat) + (1 - y) * Math.log(1 - yHat));
        document.getElementById('loss-result').innerText = loss.toFixed(4);

        // 更新公式显示
        const formulaEl = document.getElementById('formula');
        if (y === 1) {
            formulaEl.innerHTML = `L = -[ <span class="formula-highlight">1</span>·log(<span class="formula-highlight">${yHat}</span>) + (1-1)·log(1-ŷ) ] = <span class="formula-highlight">${loss.toFixed(3)}</span>`;
        } else {
            formulaEl.innerHTML = `L = -[ 0·log(ŷ) + (<span class="formula-highlight">1-0</span>)·log(1-<span class="formula-highlight">${yHat}</span>) ] = <span class="formula-highlight">${loss.toFixed(3)}</span>`;
        }

        // 更新图表点
        const pointData = new Array(chart.data.labels.length).fill(null);
        const index = Math.round(yHat * 100) - 1;
        pointData[index] = loss;
        chart.data.datasets[2].data = pointData;
        
        // 视觉强调选中的曲线
        chart.data.datasets[0].borderWidth = (y === 1) ? 3 : 1;
        chart.data.datasets[0].borderDash = (y === 1) ? [] : [5, 5];
        chart.data.datasets[1].borderWidth = (y === 0) ? 3 : 1;
        chart.data.datasets[1].borderDash = (y === 0) ? [] : [5, 5];

        chart.update('none');
    }

    window.onload = () => {
        initChart();
        update();
    };
</script>

</body>
</html>
