
<h2 class="sr-only">2D optimal transport plan showing mass flow from 3 source points to 2 target points</h2>
<svg viewBox="-40 -20 340 260" xmlns="http://www.w3.org/2000/svg" style="width:100%; max-width:680px;" role="img">
  <title>Optimal transport plan between P and Q in 2D</title>
  <desc>Three source points X1, X2, X3 send mass to two target points Y1, Y2 along optimal routes.</desc>

  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="rgba(120,80,200,0.7)"/>
    </marker>
  </defs>

  <style>
    .t { font-family: var(--font-sans, system-ui); font-size: 13px; fill: var(--color-text-primary, #222); }
    .ts { font-family: var(--font-sans, system-ui); font-size: 11px; fill: var(--color-text-secondary, #666); }
    .tm { font-family: var(--font-mono, monospace); font-size: 10px; fill: rgba(120,80,200,0.9); }
  </style>

  <!-- Grid -->
  <line x1="0" y1="0" x2="0" y2="210" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.5"/>
  <line x1="0" y1="210" x2="300" y2="210" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.5"/>
  <text x="-8" y="215" class="ts" text-anchor="end">0</text>
  <text x="55" y="228" class="ts" text-anchor="middle">1</text>
  <text x="115" y="228" class="ts" text-anchor="middle">2</text>
  <text x="175" y="228" class="ts" text-anchor="middle">3</text>
  <text x="-8" y="155" class="ts" text-anchor="end">1</text>
  <text x="-8" y="95" class="ts" text-anchor="end">2</text>
  <text x="-8" y="35" class="ts" text-anchor="end">3</text>

  <!-- Grid lines -->
  <line x1="55" y1="0" x2="55" y2="210" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="115" y1="0" x2="115" y2="210" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="175" y1="0" x2="175" y2="210" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="0" y1="150" x2="300" y2="150" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="0" y1="90" x2="300" y2="90" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.3" stroke-dasharray="3,3"/>
  <line x1="0" y1="30" x2="300" y2="30" stroke="var(--color-border-tertiary, #ddd)" stroke-width="0.3" stroke-dasharray="3,3"/>

  <!-- Transport arrows (thickness ~ mass) -->
  <!-- X1(0,0)->Y1(3,0): mass=1/6 -->
  <line x1="5" y1="207" x2="170" y2="210" stroke="rgba(120,80,200,0.5)" stroke-width="2" marker-end="url(#ah)"/>
  <text x="85" y="202" class="tm">1/6</text>

  <!-- X1(0,0)->Y2(1,2): mass=1/6 -->
  <line x1="3" y1="205" x2="52" y2="93" stroke="rgba(120,80,200,0.5)" stroke-width="2" marker-end="url(#ah)"/>
  <text x="14" y="148" class="tm">1/6</text>

  <!-- X2(2,1)->Y1(3,0): mass=1/3 -->
  <line x1="118" y1="152" x2="172" y2="212" stroke="rgba(120,80,200,0.5)" stroke-width="4" marker-end="url(#ah)"/>
  <text x="155" y="175" class="tm">1/3</text>

  <!-- X3(1,3)->Y2(1,2): mass=1/3 -->
  <line x1="55" y1="33" x2="55" y2="87" stroke="rgba(120,80,200,0.5)" stroke-width="4" marker-end="url(#ah)"/>
  <text x="65" y="62" class="tm">1/3</text>

  <!-- Source points P (blue) -->
  <!-- X1=(0,0) -> pixel (0, 210) -->
  <circle cx="0" cy="210" r="7" fill="#3266ad"/>
  <text x="-5" y="240" class="t" fill="#3266ad" font-weight="500">X₁(0,0)</text>

  <!-- X2=(2,1) -> pixel (115, 150) -->
  <circle cx="115" cy="150" r="7" fill="#3266ad"/>
  <text x="125" y="145" class="t" fill="#3266ad" font-weight="500">X₂(2,1)</text>

  <!-- X3=(1,3) -> pixel (55, 30) -->
  <circle cx="55" cy="30" r="7" fill="#3266ad"/>
  <text x="65" y="22" class="t" fill="#3266ad" font-weight="500">X₃(1,3)</text>

  <!-- Target points Q (coral) -->
  <!-- Y1=(3,0) -> pixel (175, 210) -->
  <circle cx="175" cy="210" r="7" fill="#D85A30"/>
  <text x="185" y="240" class="t" fill="#D85A30" font-weight="500">Y₁(3,0)</text>

  <!-- Y2=(1,2) -> pixel (55, 90) -->
  <circle cx="55" cy="90" r="7" fill="#D85A30"/>
  <text x="65" y="83" class="t" fill="#D85A30" font-weight="500">Y₂(1,2)</text>
</svg>
